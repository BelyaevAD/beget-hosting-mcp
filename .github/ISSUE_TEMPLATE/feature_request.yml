name: Feature request
description: Suggest an improvement or new Beget API workflow
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior or API method support you want.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety Notes
      description: Mention whether this affects write operations, DNS, mail routing, backups, or credentials.
